<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archon</title>
    <script>
      (function () {
        try {
          var k = "archon-theme";
          var t = localStorage.getItem(k);
          if (t === "light" || t === "dark") {
            document.documentElement.setAttribute("data-theme", t);
          } else if (
            window.matchMedia("(prefers-color-scheme: light)").matches
          ) {
            document.documentElement.setAttribute("data-theme", "light");
          } else {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/png" href="/a_logo_raw.png" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Chat history">
        <div class="sidebar-header">
          <h2 class="sidebar-heading">History</h2>
          <button type="button" class="btn-new-chat" id="new-chat-btn">
            New chat
          </button>
        </div>
        <ul class="chat-history" id="chat-history"></ul>
      </aside>

      <div
        class="sidebar-backdrop hidden"
        id="sidebar-backdrop"
        aria-hidden="true"
      ></div>

      <div class="main-column" id="app">
        <header class="site-header">
          <button
            type="button"
            class="sidebar-open-btn"
            id="sidebar-open-btn"
            aria-label="Open chat history"
            aria-expanded="false"
            aria-controls="sidebar"
          >
            <span aria-hidden="true">☰</span>
          </button>
          <button
            type="button"
            class="theme-toggle-btn"
            id="theme-toggle-btn"
            aria-label="Switch theme"
            aria-pressed="false"
          ></button>
          <div class="site-header-inner">
            <div class="site-header-text">
              <div class="site-header-logo">
                <img
                  class="site-logo"
                  src="/a_logo_raw.png"
                  alt=""
                  decoding="async"
                />
                <h1>Archon</h1>
              </div>
              <p class="subtitle">Search the web. Think with AI.</p>
            </div>
          </div>
        </header>

        <main id="main-panel">
          <div class="composer-strip">
            <form
              id="search-form"
              class="composer-strip-form"
              autocomplete="off"
            >
              <div class="input-row">
                <textarea
                  id="query-input"
                  class="composer-input"
                  placeholder="Ask anything…"
                  autocomplete="off"
                  autofocus
                ></textarea>
                <div class="composer-submit-row">
                  <div class="composer-model-cluster">
                    <div class="composer-model-inline">
                      <label for="model-select" class="composer-model-label"
                        >Model</label
                      >
                      <select
                        id="model-select"
                        class="composer-model-select"
                        aria-label="Ollama model"
                      >
                        <option value="">Loading…</option>
                      </select>
                    </div>
                    <span
                      class="composer-reasoning-tag hidden"
                      aria-label="Reasoning-capable model"
                      title="This model can stream a separate reasoning trace from Ollama"
                      >Reasoning</span
                    >
                    <label
                      class="deep-research-field"
                      title="Multi-round search, full-page excerpts, two-pass answer. Slower."
                    >
                      <input
                        type="checkbox"
                        id="deep-research-toggle"
                        class="archon-deep-toggle"
                        autocomplete="off"
                      />
                      Deep research
                    </label>
                  </div>
                  <button
                    type="submit"
                    id="submit-btn"
                    class="composer-submit-btn"
                  >
                    <span id="btn-label" class="composer-submit-label"
                      >Search</span
                    >
                  </button>
                </div>
              </div>
            </form>
            <div
              class="composer-status hidden"
              id="main-composer-status"
              aria-live="polite"
            ></div>
          </div>

          <section id="conversation-section" class="hidden">
            <h2>Conversation</h2>
            <div
              id="conversation"
              class="conversation"
              aria-live="polite"
            ></div>
          </section>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
