<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archon</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Chat history">
        <div class="sidebar-header">
          <h2 class="sidebar-heading">History</h2>
          <button type="button" class="btn-new-chat" id="new-chat-btn">
            New chat
          </button>
        </div>
        <ul class="chat-history" id="chat-history"></ul>
      </aside>

      <div
        class="sidebar-backdrop hidden"
        id="sidebar-backdrop"
        aria-hidden="true"
      ></div>

      <div class="main-column" id="app">
        <header class="site-header">
          <button
            type="button"
            class="sidebar-open-btn"
            id="sidebar-open-btn"
            aria-label="Open chat history"
            aria-expanded="false"
            aria-controls="sidebar"
          >
            <span aria-hidden="true">☰</span>
          </button>
          <div class="site-header-inner">
            <img class="site-logo" src="/logo.png" alt="" decoding="async" />
            <div class="site-header-text">
              <h1>Archon</h1>
              <p class="subtitle">Search the web. Think with AI.</p>
            </div>
          </div>
        </header>

        <main>
          <form id="search-form">
            <div class="input-row">
              <input
                id="query-input"
                type="text"
                placeholder="Ask anything…"
                autocomplete="off"
                autofocus
              />
              <button type="submit" id="submit-btn">
                <span id="btn-label">Search</span>
              </button>
            </div>
          </form>

          <section id="status" class="hidden"></section>

          <section id="answer-section" class="hidden">
            <h2>Answer</h2>
            <div id="answer" class="markdown-body"></div>
          </section>

          <section id="sources-section" class="hidden">
            <h2>Sources</h2>
            <ul id="sources"></ul>
          </section>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
